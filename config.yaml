model_name: google/gemma-4-E4B
data_dir: ./sample_corpus
output_dir: ./outputs/code_diffusion

seq_length: 256

mask_ratio_min: 0.1
mask_ratio_max: 0.35
warmup_steps: 20
random_mask_ratio_min: 0.1
random_mask_ratio_max: 0.4
mask_span_min_tokens: 3
mask_span_max_tokens: 50

task_type_weights:
  masked_reconstruction: 0.35
  fim: 0.2
  bug_fix: 0.2
  refinement: 0.15
  doc_test_based: 0.1

mask_strategy_weights:
  random: 0.3
  span: 0.25
  structure: 0.25
  smart: 0.2

structure_mask_features:
  function_bodies: true
  full_lines: true
  return_statements: true
  argument_lists: true

smart_mask_weights:
  function_logic: 1.0
  conditionals: 0.9
  return_expressions: 1.0
  argument_lists: 0.6
  full_lines: 0.4

deduplicate_dataset: true
validate_python: true
filter_generated_code: true
filter_minified_code: true
filter_boilerplate: true
max_file_size_bytes: 200000
max_line_length: 400
max_code_lines: 2000
dataset_preview_examples: 5

synthetic_generation_enabled: false
synthetic_provider:
synthetic_model:
synthetic_base_url: https://api.openai.com/v1
synthetic_api_key_env: OPENAI_API_KEY
synthetic_timeout_seconds: 60
synthetic_cache_dir: ./outputs/synthetic_cache

train_steps: 50
batch_size: 1
learning_rate: 0.0001
weight_decay: 0.01
grad_clip: 1.0

diffusion_steps: 8
inference_mask_span: 16
temperature: 0.8
top_k: 50
top_p: 0.95
confidence_threshold:
remask_fraction: 0.5

attention_mode: full
attn_implementation: sdpa
finetune_method: qlora
gradient_checkpointing: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_bias: none
lora_target_modules: all-linear
qlora_quant_type: nf4
qlora_use_double_quant: true
qlora_compute_dtype: bfloat16
device: auto
dtype: bfloat16
seed: 7
num_workers: 0
log_every: 5
save_every: 25

extensions:
  - .py
  - .ts
  - .tsx
  - .js
  - .jsx
  - .java
  - .go
  - .rs
